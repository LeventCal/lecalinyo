<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>lecal - test</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#dbeafe,#eff6ff);
}

/* 🌍 translate üst köşe */
#translate-box {
  position: fixed;
  top: 10px;
  right: 10px;
  transform: scale(0.8);
}

/* 🔤 mini çevirici */
#mini-translator {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  width: 220px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

#mini-translator input {
  width: 100%;
  margin-bottom: 5px;
  padding: 6px;
}

#mini-translator button {
  width: 100%;
  margin-top: 3px;
}

.container {
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:480px;
}

#word {
  font-size:34px;
  margin:20px;
  font-weight:bold;
}

input {
  padding:10px;
  width:70%;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.blue { background:#3b82f6; }
.red { background:#ef4444; }
.green { background:#22c55e; }
.gray { background:#6b7280; }

#lists {
  margin-top:20px;
  text-align:left;
}
</style>
</head>

<body>

<div id="translate-box"></div>

<div class="container">

<h2>Test</h2>

<button class="blue" onclick="startTest()">Başla</button>

<div id="testArea" style="display:none;">
  <div id="word"></div>

  <button class="green" onclick="speak(current.eng)">🔊 Oku</button>

  <input id="answer" onkeydown="handleKey(event)">
  <p id="result"></p>

  <button class="gray" onclick="finish()">Testi Bitir</button>
</div>

<div id="summary" style="display:none;">
  <p id="stats"></p>

  <button class="green" onclick="showCorrect()">Doğrular</button>
  <button class="red" onclick="showWrong()">Yanlışlar</button>
  <button class="gray" onclick="showEmpty()">Boşlar</button>

  <div id="lists"></div>
</div>

</div>

<!-- 🔤 mini çevirici -->
<div id="mini-translator">
  <input id="translate-input" placeholder="kelime yaz">
  <button onclick="translateWord()">Çevir</button>
  <button onclick="speak(document.getElementById('translate-input').value)">🔊 Oku</button>
  <p id="translate-result"></p>
</div>

<script>
let words = JSON.parse(localStorage.getItem("words")) || [];

let remaining = [];
let correct = [];
let wrong = [];
let empty = [];

let current;
let answered = false;

function startTest(){
  remaining = [...words];
  correct = [];
  wrong = [];
  empty = [];

  document.getElementById("testArea").style.display = "block";
  document.getElementById("summary").style.display = "none";

  nextWord();
}

function nextWord(){
  if(remaining.length === 0){
    finish();
    return;
  }

  let i = Math.floor(Math.random()*remaining.length);
  current = remaining.splice(i,1)[0];

  document.getElementById("word").innerText = current.eng;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  answered = false;
}

function check(){
  if(answered) return;

  let user = document.getElementById("answer").value.toLowerCase().trim();
  let meanings = current.tr.toLowerCase().split("/").map(m => m.trim());
  let allAnswers = meanings.join(" / ");

  if(user === ""){
    result.innerText = "⚪ Boş → " + allAnswers;
    empty.push(current);
  }
  else if(meanings.some(m => m.includes(user))){
    result.innerText = "✅ Doğru → " + allAnswers;
    correct.push(current);
  }
  else {
    result.innerText = "❌ Yanlış → " + allAnswers;
    wrong.push(current);
  }

  answered = true;
}

function handleKey(e){
  if(e.key === "Enter"){
    if(!answered) check();
    else nextWord();
  }
}

function finish(){
  if(!answered && current) check();

  document.getElementById("testArea").style.display = "none";
  document.getElementById("summary").style.display = "block";

  let total = correct.length + wrong.length + empty.length;

  document.getElementById("stats").innerHTML =
    "Doğru: " + correct.length +
    " | Yanlış: " + wrong.length +
    " | Boş: " + empty.length;
}

function showCorrect(){
  lists.innerHTML = correct.map(w => w.eng + " - " + w.tr).join("<br>");
}

function showWrong(){
  lists.innerHTML = wrong.map(w => w.eng + " - " + w.tr).join("<br>");
}

function showEmpty(){
  lists.innerHTML = empty.map(w => w.eng + " - " + w.tr).join("<br>");
}

/* 🔤 ÇEVİRİ */
function translateWord(){
  let text = document.getElementById("translate-input").value;

  fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=tr&dt=t&q=" + encodeURIComponent(text))
    .then(res => res.json())
    .then(data => {
      document.getElementById("translate-result").innerText = data[0][0][0];
    });
}

/* 🔊 SESLİ OKUMA */
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 0.9;
  window.speechSynthesis.speak(speech);
}

/* 🌍 GOOGLE TRANSLATE */
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'tr',
    includedLanguages: 'tr,en'
  }, 'translate-box');
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>

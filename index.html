<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>lecal - kelime ekle</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#dbeafe,#eff6ff);
}

.container {
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:500px;
}

textarea {
  width:100%;
  height:200px;
  padding:10px;
  margin-top:10px;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.blue { background:#3b82f6; }
.red { background:#ef4444; }
</style>
</head>

<body>

<div class="container">

<h2>Kelime Ekle</h2>

<p>Format: <br>
go off çalmak/patlamak <br>
veya <br>
go off - çalmak/patlamak
</p>

<textarea id="bulkInput" placeholder="Kelime listesini buraya yapıştır..."></textarea>

<br>

<button class="blue" onclick="addWords()">Ekle</button>
<button class="blue" onclick="goTest()">Teste Git</button>
<button class="red" onclick="resetWords()">Sıfırla</button>

</div>

<script>
function addWords(){
  let text = document.getElementById("bulkInput").value.trim();

  if(!text) return alert("Boş!");

  let lines = text.split("\n");

  let words = lines.map(line => {

    line = line.trim();

    // 🔥 önce "-" kontrol et
    if(line.includes(" - ")){
      let parts = line.split(" - ");
      return {
        eng: parts[0].trim(),
        tr: parts[1].trim()
      };
    }

    // 🔥 yoksa boşlukla çöz (multi-word destekli)
    let wordsArr = line.split(" ");

    // ilk kelimeyi al (ama İngilizce multi-word olabilir diye gelişmiş kontrol)
    let splitIndex = wordsArr.findIndex(w => w.includes("/"));

    // eğer / yoksa son kelimeyi anlam kabul et
    if(splitIndex === -1){
      let eng = wordsArr.slice(0, wordsArr.length - 1).join(" ");
      let tr = wordsArr[wordsArr.length - 1];
      return { eng, tr };
    }

    let eng = wordsArr.slice(0, splitIndex).join(" ");
    let tr = wordsArr.slice(splitIndex).join(" ");

    return { eng, tr };
  });

  localStorage.setItem("words", JSON.stringify(words));

  alert("Kelime eklendi ✅");
}

function goTest(){
  window.location.href = "test.html";
}

function resetWords(){
  localStorage.removeItem("words");
  alert("Sıfırlandı ❌");
}
</script>

</body>
</html>
